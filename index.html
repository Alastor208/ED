<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:sans-serif;
background:black;
color:white;
}

/* 첫 화면 */
.section1{
height:100vh;
background:url("https://raw.githubusercontent.com/Alastor208/ED/refs/heads/main/Background%20.png") 
  center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.title{
font-size:60px;
letter-spacing:5px;
}

.subtitle{
margin-top:20px;
font-size:18px;
}

.arrow{
margin-top:40px;
font-size:30px;
}

/* SYSTEM ARCHIVE 영역 */

.section2{
padding:80px 20px;
background:#111;
}

.archive-title{
text-align:center;
font-size:28px;
margin-bottom:40px;
}

.tabs{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
}

.tab{
padding:10px 25px;
background:#222;
border-radius:8px;
}

.panel{
max-width:600px;
margin:auto;
background:#000;
padding:25px;
border-radius:12px;
}

</style>
</head>

<body>

<!-- 첫 화면 -->
<section class="section1">

<div class="title"></div>

<div class="subtitle"></div>

<div class="arrow">↓</div>

</section>

<!-- SYSTEM ARCHIVE -->
<section class="section2">

<div class="archive-title"></div>

<div class="tabs">
<div class="tab"></div>
<div class="tab"></div>
<div class="tab"></div>
</div>

<div class="panel">

</div>

</section>

</body>
</html>
